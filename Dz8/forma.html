<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <h1 align="center">Регистрация на онлайн-курс</h1>
  <style>
    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
    }

    form fieldset {
      border: 1px solid #ddd;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 5px;
    }

    legend {
      color: #555;
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 10px;
      color: #444;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    input:valid, select:valid {
      border-color: #007BFF;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
    }

    input:invalid, select:invalid {
      border-color: #dc3545;
    }

    .radio-group label {
      display: block;
      margin-top: 5px;
    }

    button {
      background-color: #007BFF;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      width: 100%; 
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      input, select, button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <form id="courseForm" novalidate>
      <fieldset>
        <legend>Личные данные</legend>
        <label for="fullName">ФИО*</label>
        <input type="text" id="fullName" name="fullName" placeholder="Иванов Иван Иванович" required />

        <label for="email">Email*</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com" required />

        <label for="password">Пароль*</label>
        <input type="password" id="password" name="password" placeholder="Не менее 6 символов" minlength="6" required />
      </fieldset>

      <fieldset>
        <legend>Выбор курса</legend>
        <label for="course">Курс*</label>
        <select id="course" name="course" required>
          <option value="" disabled selected>Выберите курс</option>
          <option value="web">Веб-разработка</option>
          <option value="data">Data Science</option>
          <option value="design">Графический дизайн</option>
        </select>

        <label for="startDate">Дата начала*</label>
        <input type="date" id="startDate" name="startDate" min="2024-01-01" required />

        <div id="timeContainer" class="hidden">
          <label for="preferredTime">Предпочтительное время занятий (между 12:00 и 20:00)*</label>
          <input type="time" id="preferredTime" name="preferredTime" min="12:00" max="20:00" required />
        </div>
      </fieldset>

      <fieldset>
  <legend>Дополнительно</legend>

  <label for="experience">Опыт в IT:</label>
  <div class="radio-group" id="experience">
    <label>Нет опыта<input type="radio" name="experience" value="none" /></label>
    <label>Начинающий<input type="radio" name="experience" value="beginner" /> </label>
    <label>Опытный<input type="radio" name="experience" value="advanced" checked /> </label>
  </div>

  <div class="checkbox-group">
    <label for="consent">Я согласен на обработку персональных данных*</label>
    <input type="checkbox" id="consent" name="consent" required />
  </div>
</fieldset>

      <button type="submit">Отправить заявку</button>
    </form>
  </div>

  <script>
    const startDate = document.getElementById("startDate");
    const timeContainer = document.getElementById("timeContainer");

    startDate.addEventListener("change", function () {
      if (this.validity.valid && this.value >= this.min) {
        timeContainer.classList.remove("hidden");
      } else {
        timeContainer.classList.add("hidden");
      }
    });

    document.getElementById("courseForm").addEventListener("submit", function (e) {
      if (!this.checkValidity()) {
        e.preventDefault();
        alert("Пожалуйста, заполните все обязательные поля корректно.");
      }
    });
  </script>
</body>
</html>
