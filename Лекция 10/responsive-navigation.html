
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/d23624fc6e.js" crossorigin="anonymous"></script>
  <title>Responsive Navigation</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
    }

    /* ====== Навигационная панель ====== */
    .navbar {
      position: relative;
      background-color: #333;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: flex-end; /* бургер справа */
      padding: 0 20px;
    }

    /* ====== Ссылки меню ====== */
    .nav-links {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;        /*  запрет переносов */
  white-space: nowrap;      /*  не переносить текст внутри ссылок */
}


    .nav-links a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      transition: background-color 0.3s;
    }

    .nav-links a:hover {
      background-color: #ddd;
      color: black;
    }

    /* ====== Иконка бургера ====== */
    .fa-bars {
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: none; /* скрыт до брейкпоинта */
    }

    /* ====== Мобильная версия ====== */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        align-items: flex-start;
        height: auto;
        padding: 10px 20px;
      }

      .fa-bars {
        display: block; /* показываем бургер */
        align-self: flex-end;
      }

      .nav-links {
        position: static;
        transform: none;
        flex-direction: column;
        width: 100%;
        display: none;
      }

      .nav-links.show {
        display: flex; 
      }

      .nav-links a {
        width: 100%;
        border-top: 1px solid #444;
        padding: 12px 20px;
      }
    }
  </style>
</head>

<body>
  <h2 style="text-align:center;">Responsive navigation menu</h2>
  <p style="text-align:center;">Сожми окно браузера — при ширине меньше 600px появится бургер-меню.</p>

  <div class="navbar">
    <div class="nav-links" id="nav-links">
      <a href="#">Link 1</a>
      <a href="#">Link 2</a>
      <a href="#">Link 3</a>
      <a href="#">Link 4</a>
      <a href="#">Link 5</a>
    </div>
    <i class="fa-solid fa-bars" id="menu-icon"></i>
  </div>

  <script>
    const menuIcon = document.getElementById('menu-icon');
    const navLinks = document.getElementById('nav-links');

    menuIcon.addEventListener('click', () => {
      navLinks.classList.toggle('show');
    });
  </script>
</body>
</html>
