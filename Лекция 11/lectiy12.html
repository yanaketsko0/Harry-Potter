<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анкета</title>
    <style>
        select[name="film_genre"], select[name="book_genre"] {
            display: none;
        }

        input[type="radio"][value="book"]:checked ~ select[name="book_genre"] {
            display: block;
        }

        input[type="radio"][value="film"]:checked ~ select[name="film_genre"] {
            display: block;
        }
    </style>
</head>
<body>

    <h3>—Информация о вас</h3>

    <form>
        <label for="name">Ваше имя</label><br/>
        <input type="text" id="name" name="name" placeholder="Введите имя" 
               required pattern="[A-Za-zА-Яа-яЁё\s]+" 
               title="Имя может содержать только буквы и пробелы"><br/><br/>

        <label for="email">Ваша электронная почта</label><br/>
        <input type="email" id="email" name="email" placeholder="Введите email" 
               required 
               title="Введите корректный email"><br/><br/>

        <label for="age">Ваш возраст</label><br/>
        <input type="number" id="age" name="age" value="25" 
               required min="16" max="99" 
               title="Возраст должен быть от 16 до 99 лет"><br/><br/>

        <fieldset>
            <legend>Ваши предпочтения</legend>
            <p>Вы предпочитаете</p>
            <input type="radio" id="book" name="preferences" value="book" checked>
            <label for="book">Книги</label>
            <input type="radio" id="film" name="preferences" value="film">
            <label for="film">Фильмы</label>

            <p>Выберите жанр</p>
            <select name="book_genre">
                <option value="romance" selected>роман</option>
                <option value="comedy">приключения</option>
                <option value="historical">исторический</option>
                <option value="science fiction">научная фантастика</option>
            </select>

            <select name="film_genre">
                <option value="romance" selected>мелодрама</option>
                <option value="comedy">комедия</option>
                <option value="historical">документальный</option>
                <option value="science fiction">научная фантастика</option>
            </select>

            <p>Комментарий по предпочитаемым жанрам</p>
            <textarea name="comment">Я предпочитаю...</textarea><br/><br/>
        </fieldset>

        <label for="date">Дата выхода произведения не позднее чем (выберите дату)</label><br/>
        <input type="date" id="date" name="date" min="1900-01-01" max="2026-01-01" value="2023-01-01"><br/><br/>

        <label>
            <input type="checkbox" id="newsletter" name="newsletter">
            Согласие на получение рассылки?
        </label><br/><br/>

        <button type="submit">Отправить анкету</button>
        <button type="reset">Заполнить заново</button>
    </form>

</body>
</html>
