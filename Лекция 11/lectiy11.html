<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анкета</title>
</head>
<body>
    <form method="get" action="https://fe.it-academy.by/TestForm.php">
        <label for="name">Ваше имя</label><br>
        <input type="text" id="name" name="name" maxlength="20"><br><br>

        <label for="age">Ваш возраст</label><br>
        <input type="text" id="age" name="age" maxlength="2" value="25"><br><br>

        <label>Вы предпочитаете</label><br>
        <input type="radio" id="book" name="preferences" value="book" checked>
        <label for="book">Книги</label>
        <input type="radio" id="film" name="preferences" value="film">
        <label for="film">Фильмы</label><br><br>

        <label for="agreement">Даёте согласие на получение рассылки?</label>
        <input type="checkbox" id="agreement" name="agreement" value="yes" checked><br><br>

        <input type="hidden" name="location" value="Belarus">

        <input type="submit" value="Отправить анкету">
    </form>
</body>
</html>
