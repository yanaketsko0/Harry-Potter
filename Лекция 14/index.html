<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Documents</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f0f0f0;
      padding: 20px;
    }

    #grid {
      display: grid;
      width: 600px;
      height: 400px;
      margin: 0 auto;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 50px 1fr 100px;
      gap: 10px;
    }

    #grid > div {
      font-size: 2em;
      background: gold;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    #grid div:nth-child(1) {
      grid-column: 1 / span 3;
      grid-row: 1;
    }

    #grid div:nth-child(2) {
      grid-column: 1 / span 2;
      grid-row: 2;
    }

    #grid div:nth-child(3) {
      grid-column: 3;
      grid-row: 2 / span 2;
    }

    #grid div:nth-child(4) {
      grid-column: 1;
      grid-row: 3;
    }

    #grid div:nth-child(5) {
      grid-column: 2;
      grid-row: 3;
    }
  </style>
</head>
<body>
  <div id="grid">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
</body>
</html>
