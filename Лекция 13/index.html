<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Documents</title>
  <style>
    .main {
      position: relative;
      width: 400px;
      height: 400px;
      border: 1px solid black;
      background: green;
      margin: 5em auto;
    }

    .main div {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 1px solid black;
      top: 150px;
      left: 150px;
    }

    .red {
      background: red;
      animation: rd 3s linear infinite;
    }

    .blue {
      background: blue;
      animation: blu 3s linear infinite;
    }

    .yellow {
      background: yellow;
      animation: yel 3s linear infinite;
    }

    @keyframes rd {
      0%   { top: 150px; left: 150px; }
      100% { top: 0px;   left: 150px; }
    }

    @keyframes blu {
      0%   { top: 150px; left: 150px; }
      100% { top: 300px; left: 150px; }
    }

    @keyframes yel {
      0%   { top: 150px; left: 150px; }
      100% { top: 150px; left: 300px; }
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="red"></div>
    <div class="blue"></div>
    <div class="yellow"></div>
  </div>
</body>
</html>
